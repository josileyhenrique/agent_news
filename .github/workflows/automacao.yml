name: Henry Security Agent - Automation
on:
  # Permite que você ainda rode manualmente pelo botão sempre que quiser
  workflow_dispatch:
  
  # Agenda a execução para rodar 4 vezes ao dia (A cada 6 horas: 00:00, 06:00, 12:00, 18:00 UTC)
  schedule:
    - cron: '0 */6 * * *'
permissions: 
  contents: write
jobs:
  rodar-agente:
    runs-on: ubuntu-latest

    steps:
    # 1. Copia os arquivos do seu repositório para a máquina virtual
    - name: Clonar Repositório
      uses: actions/checkout@v4

    # 2. Instala o Python na máquina virtual
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Instala as bibliotecas que colocamos no requirements.txt
    - name: Instalar Dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. Executa o script passando as chaves certas do Telegram
    - name: Executar Script do Agente
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_KEY: ${{ secrets.TELEGRAM_BOT_KEY }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python agentnews.py
    # 5. Salva o histórico de links no repositório para evitar repetições
    - name: Salvar histórico de postagens
      run: |
        git config --global user.name "Henry Security Bot"
        git config --global user.email "bot@henrysecurity.com"
        git add ultimo_link.txt
        git commit -m "Chore: Atualizado histórico de links enviados [skip ci]" || exit 0
        git push
     